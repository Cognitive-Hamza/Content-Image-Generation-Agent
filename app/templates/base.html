<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Al-Nafi Content & Image Generation{% endblock %}</title>
  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/htmx-sse.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="topbar">
    <nav>
      <a href="/">Home</a>
      <a href="/content/new">Generate Content</a>
      <a href="/image/new">Generate Image</a>
      <a href="/translate">Translate</a>
      <a href="/history">History</a>
    </nav>
    {% if user %}
      <span class="signed-in-as">Signed in as {{ user.display_name or user.email }}</span>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
